# Rosclaw Crawler Configuration
# Copy this file to config.yaml and fill in your API keys

# LLM Provider (DeepSeek)
deepseek:
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"
  temperature: 0.1
  max_tokens: 500

# GitHub API
github:
  token: "${GITHUB_TOKEN}"
  per_page: 10
  rate_limit_delay: 1.5

# Rosclaw Site API
rosclaw:
  api_key: "${ROSCALW_API_KEY}"
  base_url: "https://www.rosclaw.io"
  
# Crawler Settings
crawler:
  # Search queries for discovering new MCPs and Skills
  queries:
    mcp:
      - "mcp-server robotics"
      - "mcp-server robot"
      - "mcp-server ros"
      - "mcp-server ros2"
      - "mcp-server drone"
      - "mcp-server 3d-printer"
      - "mcp-server manipulator"
      - "mcp-server servo"
      - "mcp-server actuator"
      - "mcp-server plc"
      - "mcp-server arduino"
      - "mcp-server esp32"
      - "mcp-server sensor"
      - "mcp-server motor"
      - "mcp-server gripper"
      - "mcp-server cnc"
      - "mcp-server bambu"
      - "mcp-server klipper"
      - "mcp-server prusa"
      - "mcp-server flashforge"
      - "mcp-server qidi"
      - "mcp-server industrial"
      - "mcp-server automation"
      - "mcp-server iot"
      - "mcp-server mqtt"
      - "mcp-server humanoid"
      - "mcp-server quadruped"
      - "mcp-server spot"
      - "mcp-server boston-dynamics"
      - "mcp-server unitree"
      - "mcp-server franka"
      - "mcp-server ur5"
      - "mcp-server kinova"
      - "mcp-server xarm"
      - "mcp-server realsense"
    skill:
      - "skill.md robotics"
      - "skill.md robot"
      - "skill.md ros"
      - "claude-skill robot"
      - "agent-skill robotics"
      - "skill.md drone"
      - "skill.md 3d-printing"
      - "skill.md automation"
      - "claude-skill robotics"
      - "claude-skill ros"
      - "agent-skill robot"
      - "agent-skill drone"
  
  # Quality thresholds
  min_stars: 0
  max_results_per_query: 5
  
  # LLM Judgment
  llm_judgment:
    enabled: true
    confidence_threshold: 80
    
  # Upload
  auto_upload: false
  upload_delay: 0.5

# Database
database:
  path: "data/rosclaw_hub.db"
  
# Logging
logging:
  level: INFO
  file: "logs/rosclaw_crawler.log"
